[custom]
; ==========================================================
; OpenClash 优化版：无国家分组 + 双池模式
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 1. 节点清洗
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 2. 规则 (Rules)
; ==========================================================
; 注意：这里直接指向策略组名称，组名必须在下方 custom_proxy_group 中定义

; --- Adobe (屏蔽/直连/代理) ---
; 规则1: 域名匹配 Adobe -> 进入 Adobe 组 (由策略组决定是屏蔽还是走代理)
ruleset=🟥 Adobe,[]GEOSITE,adobe
; 规则2: IP 匹配 Adobe -> 进入 Adobe 组
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 补丁 (建议简化，避免 clash-classic 报错) ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
; 如果下面的 IP 规则报错，可以注释掉
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- Aethersailor 代理补丁 ---
ruleset=📍 手动节点,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=📍 手动节点,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用/下载/BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; --- 核心应用 (指向智能自动池) ---
ruleset=📦 Notion,[]GEOSITE,Notion
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

; --- 苹果/视频/流媒体 (指向智能自动池) ---
; Apple 国内通常直连，但 Apple Music/TV 可能需要代理，这里统一放智能池，Apple 组里会处理
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve

; --- 海外主流 ---
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter

; --- 开发/工具 ---
ruleset=🧑‍💻 GitHub,[]GEOSITE,github
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest
ruleset=🎮 Steam,[]GEOSITE,steam

; --- 交易所 ---
ruleset=🟦 OKX,[]GEOSITE,okx
ruleset=🟨 Binance,[]GEOSITE,binance
ruleset=🟪 Bybit,[]GEOSITE,bybit

; --- 社交/通讯 ---
ruleset=📞 即时通讯,[]GEOSITE,category-communication
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=↔️ teamviewer,[]GEOSITE,teamviewer

; --- Google/微软/Cloudflare ---
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=🔎 Google,[]GEOSITE,google
ruleset=🪟 Microsoft,[]GEOSITE,microsoft

; --- GFW 兜底 (指向手动节点，防止漏网) ---
ruleset=📍 手动节点,[]GEOSITE,gfw

; --- 最终兜底 ---
; 如果没有匹配任何规则，默认走智能自动
ruleset=🌐 智能自动,[]FINAL

; ==========================================================
; 3. 策略组 (Proxy Groups)
; ==========================================================

; --- 核心代理池 ---
; 1. 智能自动：自动测速最快节点
; 注意：OpenClash 要求 url-test 必须至少有一个节点才能工作，如果节点池为空，请手动选择一个节点作为备用
custom_proxy_group=🌐 智能自动`url-test`.*`https://www.gstatic.com/generate_204`300,,50

; 2. 手动节点：所有节点列表
custom_proxy_group=📍 手动节点`select`.*

; 3. 备用自动（可选，防止 url-test 组被占用）
custom_proxy_group=⚡ 自动代理`url-test`.*`https://www.gstatic.com/generate_204`300,,50

; --- 应用专属策略组 (UI 显示用，实际路由由 ruleset 决定) ---
; 这些组只用于在 UI 上显示开关，默认策略指向上面的核心池

; Adobe 组：可以一键屏蔽
custom_proxy_group=🟥 Adobe`select`[]REJECT`[]DIRECT`[]🌐 智能自动

; Apple/Steam/Microsoft/测速：默认直连，也可切换
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🌐 智能自动
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]🌐 智能自动
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🌐 智能自动
custom_proxy_group=🚝 测速工具`select`[]DIRECT`[]🌐 智能自动

; GitHub：默认手动，因为有时自动节点不稳定
custom_proxy_group=🧑‍💻 GitHub`select`[]📍 手动节点`[]DIRECT

; 其他应用：默认智能自动，也可切换
custom_proxy_group=📦 Notion`select`[]🌐 智能自动
custom_proxy_group=📨 Telegram`select`[]🌐 智能自动
custom_proxy_group=🤖 ChatGPT`select`[]🌐 智能自动
custom_proxy_group=🧠 AI`select`[]🌐 智能自动
custom_proxy_group=🎬 YouTube`select`[]🌐 智能自动
custom_proxy_group=🎥 Netflix`select`[]🌐 智能自动
custom_proxy_group=🎵 TikTok`select`[]🌐 智能自动
custom_proxy_group=📸 Instagram`select`[]🌐 智能自动
custom_proxy_group=🐦 X`select`[]🌐 智能自动
custom_proxy_group=🟦 OKX`select`[]🌐 智能自动
custom_proxy_group=🟨 Binance`select`[]🌐 智能自动
custom_proxy_group=🟪 Bybit`select`[]🌐 智能自动
custom_proxy_group=📞 即时通讯`select`[]🌐 智能自动
custom_proxy_group=💬 社交媒体`select`[]🌐 智能自动
custom_proxy_group=↔️ teamviewer`select`[]🌐 智能自动
custom_proxy_group=☁️ cloudflare`select`[]🌐 智能自动
custom_proxy_group=🔎 Google`select`[]🌐 智能自动

; --- 兜底组 ---
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 智能自动`[]DIRECT
