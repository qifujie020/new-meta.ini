# ==================== 规则集（Rule-Providers）================
# 如果你启用了 rule-generator，这里会自动生成
# 否则请在 OpenClash → 规则集管理 中添加对应的规则集

rule-providers:
  adobe:
    type: http
    behavior: domain
    url: https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/adobe.txt
    path: ./ruleset/adobe.yaml
    interval: 86400

  # 其他 geosite 可按需添加...
