  - RULE-SET,geosite:youtube,🎬 YouTube
  - RULE-SET,geosite:netflix,🎥 Netflix
  - RULE-SET,geoip:netflix,🎥 Netflix,no-resolve

  # 海外主流
  - RULE-SET,geosite:tiktok,🎵 TikTok
  - RULE-SET,geosite:instagram,📸 Instagram
  - RULE-SET,geosite:twitter,🐦 X

  # 开发工具
  - RULE-SET,geosite:github,🧑‍💻 GitHub
  - RULE-SET,geosite:category-speedtest,🚝 测速工具
  - RULE-SET,geosite:steam,🎮 Steam

  # 交易所
  - RULE-SET,geosite:okx,🟦 OKX
  - RULE-SET,geosite:binance,🟨 Binance
  - RULE-SET,geosite:bybit,🟪 Bybit

  # 社交通讯
