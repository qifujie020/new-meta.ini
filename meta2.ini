# ==================== 规则（Rules）================
rules:
  # 1. Adobe 屏蔽
  - RULE-SET,adobe,🚫 Adobe屏蔽
  - RULE-SET,geosite:adobe,🚫 Adobe屏蔽

  # 2. 私网 & 国内
  - RULE-SET,geosite:private,DIRECT
  - RULE-SET,geoip:private,DIRECT,no-resolve
  - RULE-SET,geosite:cn,DIRECT
  - RULE-SET,geoip:cn,DIRECT,no-resolve

  # Aethersailor 补丁
  - RULE-SET,Custom_Direct_Domain,DIRECT
  - RULE-SET,Custom_Direct_Classical_IP,DIRECT
  - RULE-SET,Custom_Proxy_Domain,📍 手动节点
  - RULE-SET,Custom_Proxy_Classical_IP,📍 手动节点

  # 国内可用服务
  - RULE-SET,geosite:google-cn,DIRECT
  - RULE-SET,geosite:category-games@cn,DIRECT
  - RULE-SET,geosite:category-game-platforms-download,DIRECT
  - RULE-SET,geosite:category-public-tracker,DIRECT

  # 核心应用
  - RULE-SET,geosite:Notion,📦 Notion
  - RULE-SET,geosite:telegram,📨 Telegram
  - RULE-SET,geosite:openai,🤖 ChatGPT
