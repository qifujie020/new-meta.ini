# ==================== OpenClash 自定义订阅转换模板 ====================
# 版本：2025 中国大陆 高速 + 零DNS泄露版
# 使用方法：OpenClash → 配置管理 → 订阅设置 → 开启「在线订阅转换」→ 自定义模板 → 粘贴保存

[custom]
# 基础设置
clash.new_field_name = true
clash.mode = rule
clash.mixed-port = 7893
clash.allow-lan = true
clash.ipv6 = false
clash.tcp-concurrent = true
clash.unified-delay = true
clash.log-level = warning

# ==================== DNS 防泄露核心 ====================
clash.dns.enable = true
clash.dns.enhanced-mode = fake-ip
clash.dns.fake-ip-range = 198.18.0.1/16
clash.dns.use-system-hosts = true
clash.dns.use-hosts = true
clash.dns.respect-rules = true

clash.dns.nameserver = https://dns.cloudflare.com/dns-query, https://dns.google/dns-query, https://doh.opendns.com/dns-query
clash.dns.fallback = https://dns.cloudflare.com/dns-query, https://dns.google/dns-query
clash.dns.default-nameserver = https://dns.cloudflare.com/dns-query, 8.8.8.8
clash.dns.proxy-server-nameserver = https://dns.cloudflare.com/dns-query
clash.dns.fallback-filter.geoip = true
clash.dns.fallback-filter.geosite = cn

# ==================== 策略组（速度优化）===================
# 核心智能组（推荐只测低延迟节点）
custom_proxy_group=🌐 智能自动`url-test`(香港|Japan|Singapore|台湾|HK|JP|SG|TW|Korea|美国)`https://www.gstatic.com/generate_204`180,100,200

