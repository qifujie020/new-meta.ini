# ==================== OpenClash 完整配置 ====================
# 版本：修复版 + 启动优化 | 2025
# 使用方法：复制全部内容 → OpenClash → 配置管理 → 新建配置文件 → 粘贴保存

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
ipv6: false
mode: rule
log-level: warning
allow-lan: true
unified-delay: true
tcp-concurrent: true

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-system-hosts: true
  nameserver:
    - 223.5.5.5
    - 180.76.76.76
    - https://dns.alidns.com/dns-query
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geosite:
      - cn

# ==================== 节点（Proxies）================
# 请在这里粘贴你的订阅节点，或使用订阅链接自动更新
# proxies:
#   - {name: "节点1", type: ss, ...}

proxies: []

# ==================== 策略组（Proxy Groups）================
proxy-groups:
  # 核心代理池
  - name: "🌐 智能自动"
    type: url-test
    proxies: []          # 留空会自动使用所有节点
    # 建议改成正则限制节点数量，加快启动速度：
    # url-test: (香港|日本|新加坡|台湾|韩国|美国)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150

  - name: "📍 手动节点"
    type: select
    proxies: []          # 所有节点

  - name: "⚡ 自动代理"
    type: url-test
    proxies: []
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150

  # Adobe 专用组（修复核心）
  - name: "🚫 Adobe屏蔽"
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🌐 智能自动
      - 📍 手动节点

  # 应用专属组
  - name: "🟥 Adobe"
    type: select
    proxies:
      - 🚫 Adobe屏蔽

  - name: "🍎 Apple"
    type: select
